# jrc_curve_properties — sample config
# Force-compression test: loading then unloading arm
#
# Usage: jrc_curve_properties sample_data/sample.cfg
#        (run from repos/curve/ directory, or adjust paths accordingly)

[data]
file   = force_compression.csv
x_col  = displacement_mm
y_col  = force_N

[output]
label_x    = Displacement (mm)
label_y    = Force (N)
title      = Force-Compression Curve — Sample 01
plot       = yes
plot_file  = force_compression_plot.pdf

[smoothing]
method        = none
apply_to_plot = yes

[phase.loading]
smooth_method = savgol
x_start = 2
x_end   = 92.5

[phase.unloading]
after_phase = loading
x_start     = 80
x_end       = 20

[phase.final]
after_phase = loading
x_start     = 18
x_end       = 10

[global]
max_y                      = yes
min_y                      = yes
auc                        = yes
auc.phase                  = loading
hysteresis                 = yes
hysteresis_loading.phase   = loading
hysteresis_unloading.phase = unloading

[slope]
overall        = yes
overall.phase  = loading
overall.plot   = yes
secant         = yes
secant.phase   = loading
secant.x1      = 10.0
secant.x2      = 40.0
secant.plot    = yes
at_x_1         = 20.0
at_x_1.phase   = loading
at_x_1.plot    = yes
at_x_2         = 60.0
at_x_2.phase   = loading
at_x_2.plot    = yes

[query]
y_at_x_1        = 50.0
y_at_x_1.phase  = loading
y_at_x_2        = 75.0
y_at_x_2.phase  = loading
x_at_y_1        = 100.0
x_at_y_1.phase  = loading
x_at_y_1.mode   = first
x_at_y_2        = 100.0
x_at_y_2.phase  = unloading
x_at_y_2.mode   = first

[transitions]
inflections            = yes
inflections.phase      = loading
inflections.plot_slope = yes
yield.slope            = 0.10
yield.phase            = loading
