# jrc_curve_properties — sample config
# Force-compression test: loading then unloading arm
#
# Usage: jrc_curve_properties sample_data/sample.cfg
#        (run from repos/curve/ directory, or adjust paths accordingly)

[data]
file   = force_compression.csv
x_col  = displacement_mm
y_col  = force_N

[output]
label_x    = Displacement (mm)
label_y    = Force (N)
title      = Force-Compression Curve — Sample 01
plot       = yes
plot_file  = force_compression_plot.pdf

[smoothing]
method        = none
apply_to_plot = yes

[phase.loading]
smooth_method = savgol
x_start = 2
x_end   = 92.5

[phase.unloading]
after_phase = loading
x_start     = 80
x_end       = 20

[phase.final]
after_phase = loading
x_start     = 18
x_end       = 10

[global]
max_y                      = yes
max_y_phase                = loading
min_y                      = yes
auc                        = yes
auc_phase                  = loading
hysteresis                 = yes
hysteresis_loading_phase   = loading
hysteresis_unloading_phase = unloading

[slope]
overall        = yes
overall_phase  = loading
overall_plot   = yes
secant         = yes
secant_phase   = loading
secant_x1      = 10.0
secant_x2      = 40.0
secant_plot    = yes
at_x_1         = 20.0
at_x_1_phase   = loading
at_x_1_plot    = yes
at_x_2         = 60.0
at_x_2_phase   = loading
at_x_2_plot    = yes

[query]
y_at_x_1        = 50.0
y_at_x_1_phase  = loading
y_at_x_2        = 75.0
y_at_x_2_phase  = loading
x_at_y_1        = 100.0
x_at_y_1_phase  = loading
x_at_y_1_mode   = first
x_at_y_2        = 100.0
x_at_y_2_phase  = unloading
x_at_y_2_mode   = first

[transitions]
inflections              = yes
inflections_phase        = loading
inflections_plot_slope   = yes
yield_slope         = 0.10
yield_phase         = loading
