
# jrc_curve_properties — sample config
# Force-compression test: loading then unloading arm
#
# Usage: jrc_curve_properties sample_data/curve_config.cfg
#        (run from repos/curve/ directory, or adjust paths accordingly)

[data]
file   = circle.csv
x_col  = x
y_col  = y

[output]
label_x    = Displacement (mm)
label_y    = Force (N)
title      = Force-Compression Curve — Sample 01
plot       = yes
plot_file  = circle_plot.pdf

[smoothing]
method        = none
apply_to_plot = yes

[phase.loading]
smooth_method = savgol
smooth_span = 0.5
search  = ascending
x_start = 0.0
x_end   = 75.0
auc     = yes
max_x = yes
max_y = yes

[phase.unloading]
smooth_method = savgol
smooth_span = 0.6
search  = descending
x_start = 90
x_end   = 40
auc = yes

[global]
maxx_y                      = yes
min_y                      = yes
max_x                      = yes
min_x                      = yes
hysteresisx                 = yes
hysteresis_loading_phase   = loading
hysteresis_unloading_phase = unloading

[transform]
y_scale    = 1.0

[query]
y_at_x_1        = 50.0
y_at_x_1_show   = yes
y_at_x_1_phase  = loading
y_at_x_2        = 75.0
y_at_x_2_show   = no
y_at_x_2_phase  = loading

[debug]
d2y=yes
d2y_phase=unloading

[transitions]
inflections_1            = yes
inflections_1_phase      = loading
inflections_1_plot_slope = yes
inflections_1_min_gap    = 0.3
yield_1_slope              = 0.20
yield_1_phase              = loading
yield_1_show               = no
yield_2_slope              = 0.30
yield_2_phase              = unloading
yield_2_show               = no

